<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESOLV | Agent Console</title>
    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .ticket-card { border-left: 5px solid #0d6efd; transition: 0.3s; }
        .ticket-card:hover { background-color: #f8f9fa; }
        #queue { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">RESOLV - Agent Console</span>
    </div>
</nav>

<div class="container-fluid p-4">
    <div class="row">
        <!-- Sidebar: Triage Queue -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Triage Queue</h5>
                <input type="text" id="searchInput" class="form-control mb-2" placeholder="Search tickets..." onkeyup="renderQueue()">
                <div id="queue"></div>
                <hr>
                <input type="text" id="newTicket" class="form-control" placeholder="New ticket title...">
                <button class="btn btn-primary mt-2 w-100" onclick="addTicket()">Add Ticket</button>
            </div>
        </div>

        <!-- Main View: Ticket Detail -->
        <div class="col-md-8">
            <div id="detailView" class="card p-4">
                <p class="text-muted">Select a ticket to see details.</p>
            </div>
        </div>
    </div>
</div>

<!-- jQuery and Script -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>
</body>
</html>
